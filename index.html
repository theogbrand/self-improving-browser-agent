<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Viewer</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .tree-line { position: relative; }
  .tree-line::before {
    content: ''; position: absolute; left: 12px; top: 0; bottom: 0;
    width: 2px; background: #e5e7eb;
  }
  @keyframes pulse-blue { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .dot-running { animation: pulse-blue 1.5s infinite; }
  .ansi-strip { white-space: pre-wrap; word-break: break-all; }
  .event-card { transition: all 0.15s; }
  .event-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .tool-call.collapsed .tool-result-slot { display: none; }
  .tool-call.collapsed .tool-chevron { transform: rotate(-90deg); }
</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<div id="app" class="max-w-4xl mx-auto px-4 py-6">
  <!-- Breadcrumb -->
  <nav id="breadcrumb" class="flex items-center gap-2 text-sm text-gray-500 mb-6">
    <span class="cursor-pointer hover:text-gray-900 font-medium" onclick="showRuns()">Runs</span>
  </nav>

  <!-- Runs View -->
  <div id="runs-view"></div>

  <!-- Traces View -->
  <div id="traces-view" class="hidden"></div>

  <!-- Detail View -->
  <div id="detail-view" class="hidden">
    <div id="events" class="space-y-2 pb-24"></div>
  </div>
</div>

<!-- Control bar -->
<div id="control-bar" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg">
  <div class="max-w-4xl mx-auto px-4 py-3 flex gap-3 items-center">
    <input id="inject-input" type="text" placeholder="Send a message to the agent..."
      class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-sm mono focus:outline-none focus:ring-2 focus:ring-blue-500"
      onkeydown="if(event.key==='Enter')sendInject()">
    <div id="agent-buttons" class="flex gap-2">
      <button onclick="sendInject()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Send</button>
      <button onclick="sendPause()" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700">Pause</button>
    </div>
    <div id="feedback-buttons" class="flex gap-2 hidden">
      <button onclick="sendFeedback()" class="px-4 py-2 bg-amber-600 text-white rounded-lg text-sm font-medium hover:bg-amber-700">Send Feedback</button>
      <button onclick="sendAccept()" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700">Accept</button>
    </div>
  </div>
</div>

<script>
const strip = s => s ? s.replace(/\x1b\[[0-9;]*m/g, '') : '';

let autoScroll = true;
let currentRun = null;
let currentFile = null;
let traceComplete = false;
let tracesInterval = null;
let feedbackMode = false;
let eventPollInterval = null;
let renderedEventCount = 0;

// --- Runs View ---
async function showRuns() {
  clearState();
  document.getElementById('breadcrumb').innerHTML = `<span class="font-semibold text-gray-900">Runs</span>`;
  hide('traces-view'); hide('detail-view'); hide('control-bar');
  show('runs-view');

  const runs = await (await fetch('/api/runs')).json();
  const el = document.getElementById('runs-view');
  if (!runs.length) { el.innerHTML = '<p class="text-gray-500">No runs found.</p>'; return; }
  el.innerHTML = runs.map(r => `
    <div class="event-card bg-white rounded-xl border border-gray-200 p-5 mb-3 cursor-pointer hover:border-blue-400" onclick="showTraces('${r}')">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-blue-50 flex items-center justify-center text-blue-600 font-semibold text-sm">${r.replace('run_','#')}</div>
        <div>
          <div class="font-semibold">${r}</div>
          <div class="text-xs text-gray-400">Click to view traces</div>
        </div>
      </div>
    </div>
  `).join('');
}

// --- Traces View ---
async function showTraces(run) {
  clearState();
  currentRun = run;
  hide('runs-view'); hide('detail-view'); hide('control-bar');
  show('traces-view');
  document.getElementById('breadcrumb').innerHTML = `
    <span class="cursor-pointer hover:text-gray-900" onclick="showRuns()">Runs</span>
    <span class="text-gray-300">/</span>
    <span class="font-semibold text-gray-900">${run}</span>`;

  await renderTraces(run);
  tracesInterval = setInterval(() => renderTraces(run), 5000);
}

async function renderTraces(run) {
  const traces = await (await fetch(`/api/traces/${run}`)).json();
  const el = document.getElementById('traces-view');
  if (!traces.length) { el.innerHTML = '<p class="text-gray-500">No traces in this run.</p>'; return; }
  el.innerHTML = traces.map(t => {
    const dot = t.status === 'success' ? 'bg-green-500' : t.status === 'failed' ? 'bg-red-500' : 'bg-yellow-400 dot-running';
    const time = t.timestamp ? new Date(t.timestamp).toLocaleString() : '';
    return `
    <div class="event-card bg-white rounded-xl border border-gray-200 p-5 mb-3 cursor-pointer hover:border-blue-400" onclick="showDetail('${run}','${t.file}')">
      <div class="flex items-center gap-3">
        <div class="w-3 h-3 rounded-full ${dot} shrink-0"></div>
        <div class="min-w-0 flex-1">
          <div class="font-medium truncate">${esc(t.task)}</div>
          <div class="text-xs text-gray-400 mono">${time}</div>
        </div>
        <div class="text-xs px-2 py-1 rounded-full ${t.status === 'success' ? 'bg-green-50 text-green-700' : t.status === 'failed' ? 'bg-red-50 text-red-700' : 'bg-yellow-50 text-yellow-700'}">${t.status}</div>
      </div>
    </div>`;
  }).join('');
}

// --- Detail View ---
async function showDetail(run, file) {
  clearState();
  currentRun = run; currentFile = file; traceComplete = false;
  renderedEventCount = 0;
  hide('runs-view'); hide('traces-view');
  show('detail-view'); show('control-bar');
  enableAgentControls();
  document.getElementById('events').innerHTML = '';
  document.getElementById('breadcrumb').innerHTML = `
    <span class="cursor-pointer hover:text-gray-900" onclick="showRuns()">Runs</span>
    <span class="text-gray-300">/</span>
    <span class="cursor-pointer hover:text-gray-900" onclick="showTraces('${run}')">${run}</span>
    <span class="text-gray-300">/</span>
    <span class="font-semibold text-gray-900 mono text-xs">${file}</span>`;

  // Load events via REST API and poll for new ones
  await pollEvents(run, file);
  eventPollInterval = setInterval(() => pollEvents(run, file), 500);

}

async function pollEvents(run, file) {
  try {
    const events = await (await fetch(`/api/trace/${run}/${file}`)).json();
    while (renderedEventCount < events.length) {
      handleEvent(events[renderedEventCount]);
      renderedEventCount++;
    }
  } catch (err) {
    console.error('Poll error:', err);
  }
}

let pendingTurn = null; // buffer model turn to merge with tool_result

function handleEvent(ev) {
  const el = document.getElementById('events');

  if (ev.type === 'start') {
    el.insertAdjacentHTML('beforeend', `
      <div class="bg-white rounded-xl border border-gray-200 p-5 mb-2">
        <div class="font-semibold text-lg">${esc(ev.task)}</div>
        <div class="text-xs text-gray-400 mono">${ev.timestamp || ''}</div>
      </div>`);
  }

  else if (ev.type === 'turn' && ev.role === 'model') {
    // Buffer model turn - render it, tool_results will attach below
    const calls = ev.functionCalls || [];
    const thinking = ev.content ? `<div class="text-blue-600 text-sm mb-2 mono ansi-strip">${esc(ev.content)}</div>` : '';
    const callsHtml = calls.map((c, i) => {
      const cmd = c.args && c.args.command ? c.args.command : '';
      const fallback = cmd ? '' : esc(truncArgs(c.args));
      return `
      <div class="tool-call collapsed border border-gray-100 rounded-lg overflow-hidden mb-1" data-tool-idx="${i}">
        <div class="flex items-center gap-2 px-3 py-2 bg-gray-50 cursor-pointer select-none" onclick="this.parentElement.classList.toggle('collapsed')">
          <svg class="w-4 h-4 text-gray-400 tool-chevron transition-transform shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>
          <span class="text-purple-600 font-medium text-sm shrink-0">${esc(c.name)}</span>
          <span class="tool-exit-badge text-xs shrink-0"></span>
          ${cmd ? `<code class="text-xs mono text-gray-700 flex-1 break-all">${esc(cmd)}</code>` : `<span class="text-gray-400 text-xs mono truncate flex-1">${fallback}</span>`}
        </div>
        <div class="tool-result-slot px-3 py-2 hidden"></div>
      </div>`;
    }).join('');

    const id = `turn-${ev.turn}`;
    el.insertAdjacentHTML('beforeend', `
      <div id="${id}" class="tree-line pl-7 mb-1">
        ${thinking}
        ${callsHtml || '<div class="text-sm text-gray-400 italic">No function calls</div>'}
      </div>`);
    pendingTurn = { turn: ev.turn, callIdx: 0 };
  }

  else if (ev.type === 'turn' && ev.role === 'user') {
    const isInjected = ev.content && !ev.content.startsWith('Task:');
    el.insertAdjacentHTML('beforeend', `
      <div class="tree-line pl-7 mb-1">
        <div class="text-sm px-3 py-2 rounded-lg ${isInjected ? 'bg-green-50 border border-green-200 text-green-800' : 'bg-gray-100 text-gray-700'}">
          <span class="font-medium text-xs ${isInjected ? 'text-green-600' : 'text-gray-500'}">${isInjected ? 'injected' : 'user'}</span>
          <div class="mono ansi-strip mt-1">${esc(ev.content)}</div>
        </div>
      </div>`);
  }

  else if (ev.type === 'tool_result') {
    // Attach to the last model turn's next tool call slot
    if (pendingTurn) {
      const turnEl = document.getElementById(`turn-${pendingTurn.turn}`);
      if (turnEl) {
        const slots = turnEl.querySelectorAll('.tool-result-slot');
        const slot = slots[pendingTurn.callIdx];
        if (slot) {
          const ok = ev.exitCode === 0;
          const stdout = strip(ev.stdout || '');
          // Set exit badge on the header row
          const badge = slot.closest('.tool-call').querySelector('.tool-exit-badge');
          if (badge) {
            badge.className = `text-xs px-1.5 py-0.5 rounded font-medium shrink-0 ${ok ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
            badge.textContent = ok ? 'exit 0' : `exit ${ev.exitCode}`;
          }
          slot.innerHTML = `<pre class="mono text-xs text-gray-600 ansi-strip max-h-64 overflow-auto">${esc(stdout)}</pre>`;
          slot.classList.remove('hidden');
          // Auto-expand on errors
          if (!ok) slot.closest('.tool-call').classList.remove('collapsed');
          pendingTurn.callIdx++;
        }
      }
    }
  }

  else if (ev.type === 'result') {
    traceComplete = true;
    el.insertAdjacentHTML('beforeend', `
      <div class="bg-white rounded-xl border-2 ${ev.success ? 'border-green-400' : 'border-red-400'} p-5 mt-4">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full ${ev.success ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'} flex items-center justify-center font-bold">${ev.success ? '✓' : '✗'}</div>
          <div>
            <div class="font-semibold">${ev.success ? 'Completed' : 'Failed'}</div>
            <div class="text-sm text-gray-600 mono">${esc(ev.summary || '')}</div>
            <div class="text-xs text-gray-400">${ev.totalTurns || '?'} turns</div>
          </div>
        </div>
      </div>`);
    disableControls();
  }

  else if (ev.type === 'feedback_request') {
    el.insertAdjacentHTML('beforeend', `
      <div class="bg-amber-50 rounded-xl border-2 border-amber-400 p-5 mt-4">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center font-bold">?</div>
          <div>
            <div class="font-semibold text-amber-800">Feedback Requested</div>
            <div class="text-sm text-amber-700">Provide feedback to improve the agent, or accept the result.</div>
          </div>
        </div>
      </div>`);
    enableFeedbackControls();
  }

  if (autoScroll) window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function enableAgentControls() {
  feedbackMode = false;
  const input = document.getElementById('inject-input');
  input.disabled = false;
  input.placeholder = 'Send a message to the agent...';
  document.querySelectorAll('#control-bar button').forEach(b => { b.disabled = false; b.classList.remove('opacity-50'); });
  document.getElementById('feedback-buttons').classList.add('hidden');
  document.getElementById('agent-buttons').classList.remove('hidden');
}

function disableControls() {
  feedbackMode = false;
  document.getElementById('inject-input').disabled = true;
  document.querySelectorAll('#control-bar button').forEach(b => { b.disabled = true; b.classList.add('opacity-50'); });
  document.getElementById('feedback-buttons').classList.add('hidden');
  document.getElementById('agent-buttons').classList.remove('hidden');
}

function enableFeedbackControls() {
  feedbackMode = true;
  traceComplete = false;
  const input = document.getElementById('inject-input');
  input.disabled = false;
  input.placeholder = 'Type feedback to improve the agent...';
  input.focus();
  document.querySelectorAll('#control-bar button').forEach(b => { b.disabled = false; b.classList.remove('opacity-50'); });
  document.getElementById('agent-buttons').classList.add('hidden');
  document.getElementById('feedback-buttons').classList.remove('hidden');
  show('control-bar');
}

async function sendControl(data) {
  if (!currentRun) return;
  try {
    await fetch(`/api/control/${currentRun}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
  } catch (err) { console.error('Control error:', err); }
}

function sendFeedback() {
  const input = document.getElementById('inject-input');
  if (!input.value.trim()) return;
  sendControl({ action: 'feedback', message: input.value.trim() });
  input.value = '';
  disableControls();
  waitForNextRun();
}

function sendAccept() {
  sendControl({ action: 'accept' });
  disableControls();
  waitForNextRun();
}

let nextRunPoll = null;
function waitForNextRun() {
  if (!currentRun) return;
  const match = currentRun.match(/^run_(\d+)$/);
  if (!match) return;
  const nextRun = `run_${parseInt(match[1]) + 1}`;

  // Show waiting indicator
  const el = document.getElementById('events');
  el.insertAdjacentHTML('beforeend', `
    <div id="waiting-indicator" class="bg-blue-50 rounded-xl border-2 border-blue-300 p-5 mt-4">
      <div class="flex items-center gap-3">
        <div class="w-3 h-3 rounded-full bg-blue-400 dot-running shrink-0"></div>
        <div class="text-sm text-blue-700 font-medium">Waiting for ${nextRun}...</div>
      </div>
    </div>`);
  if (autoScroll) window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

  nextRunPoll = setInterval(async () => {
    try {
      const traces = await (await fetch(`/api/traces/${nextRun}`)).json();
      if (traces.length > 0) {
        clearInterval(nextRunPoll);
        nextRunPoll = null;
        showDetail(nextRun, traces[0].file);
      }
    } catch {}
  }, 1500);
}

function sendInject() {
  if (feedbackMode) { sendFeedback(); return; }
  const input = document.getElementById('inject-input');
  if (!input.value.trim() || traceComplete) return;
  sendControl({ action: 'inject', message: input.value.trim() });
  input.value = '';
}

function sendPause() {
  if (traceComplete) return;
  sendControl({ action: 'pause' });
}

// --- Helpers ---
function clearState() {
  if (tracesInterval) { clearInterval(tracesInterval); tracesInterval = null; }
  if (eventPollInterval) { clearInterval(eventPollInterval); eventPollInterval = null; }
  if (nextRunPoll) { clearInterval(nextRunPoll); nextRunPoll = null; }
  pendingTurn = null;
  feedbackMode = false;
  renderedEventCount = 0;
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function escAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function truncArgs(args) {
  if (!args) return '';
  const s = typeof args === 'string' ? args : JSON.stringify(args);
  return s.length > 120 ? s.slice(0, 120) + '...' : s;
}

// Init
showRuns();
</script>
</body>
</html>
